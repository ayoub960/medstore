{% extends 'base.html' %}

{% block content %}

<div class="row">

    <!-- PRODUCT INFO -->
    <div class="col-md-6">

        <img src="{{ medicine.image.url }}" class="img-fluid rounded shadow">

        <h2 class="mt-3">{{ medicine.name }}</h2>

        <p>{{ medicine.full_description }}</p>

        <h4 class="text-success">Rs {{ medicine.price }}</h4>

        <div class="alert alert-info mt-3">
            🚚 Cash on Delivery Available All Over Pakistan
        </div>

    </div>

    <!-- ORDER FORM -->
    <div class="col-md-6">

        <h3>Place Order</h3>

        <form method="POST" action="{% url 'place_order' medicine.id %}">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100">
                Place Order
            </button>
        </form>

    </div>

</div>

{% endblock %}
